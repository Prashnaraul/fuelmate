<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Guide | FuelMate</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="home">
  <div class="card result-card">

    <p class="badge">Smart Meal Planner</p>
    <h1>Your Daily Meal Guide</h1>

    <p>
      Choose your food style and goal. FuelMate gives breakfast, lunch,
      dinner, snack ideas, and recipe links.
    </p>

    <div class="decision-box">
      <label>Food style / region</label>
      <select id="region">
        <option value="southasian">South Asian</option>
        <option value="eastasian">East Asian</option>
        <option value="latin">Latino / Hispanic</option>
        <option value="middleeastern">Middle Eastern / Mediterranean</option>
        <option value="africancaribbean">African / Caribbean</option>
        <option value="western">Western / American</option>
      </select>

      <label>Your goal</label>
      <select id="goal">
        <option value="maintain">Maintain</option>
        <option value="cut">Cut / Lose Weight</option>
        <option value="gain">Gain Muscle</option>
      </select>

      <button onclick="showMealPlan()">Generate My Meal Plan</button>
    </div>

    <div id="mealPlan"></div>

    <div class="analyzer-box">
      <h2>🔎 Food Intake Analyzer</h2>
      <p>Type a food and FuelMate will explain its nutrition role.</p>

      <input type="text" id="foodInput" placeholder="Example: pizza, fish, rice, egg">

      <button onclick="analyzeFood()">Analyze My Food</button>

      <div id="foodAnalysis"></div>
      <canvas id="foodChart"></canvas>
    </div>

    <button class="back-btn" onclick="window.location.href='result.html'">
      Back to Dashboard
    </button>

  </div>
</div>

<script src="js/food.js"></script>
</body>
</html>
